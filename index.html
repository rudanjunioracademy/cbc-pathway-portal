<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Portal | Rudan Junior Secondary</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --bg-color: #f8f9fa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .search-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }
        p { color: #666; font-size: 0.9rem; }
        .input-group {
            margin: 1.5rem 0;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: var(--accent-color);
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #1a252f;
        }
        #result-area {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #eee;
            display: none;
        }
        .pathway-result {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-top: 0.5rem;
        }
        .error {
            color: #e74c3c;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="search-card">
    <div class="logo">Rudan Junior Secondary</div>
    <p>Check your child's Senior School Pathway</p>

    <div class="input-group">
        <input type="text" id="admNo" placeholder="Enter ADM No (e.g. RJSS/001JS/2026)">
    </div>
    
    <button onclick="checkPathway()">View Pathway</button>

    <div id="result-area">
        <div id="loading" style="display:none;">Searching...</div>
        <div id="display-name" style="font-size: 0.8rem; color: #888;"></div>
        <div id="display-pathway" class="pathway-result"></div>
    </div>
</div>

<script>
    async function checkPathway() {
        const input = document.getElementById('admNo').value.trim().toUpperCase();
        const resultArea = document.getElementById('result-area');
        const displayPathway = document.getElementById('display-pathway');
        const loading = document.getElementById('loading');

        if (!input) {
            alert("Please enter an Admission Number.");
            return;
        }

        // Show loading and clear previous results
        resultArea.style.display = 'block';
        loading.style.display = 'block';
        displayPathway.innerText = '';

        try {
            // Fetch the JSON file generated by your WAMP server
            const response = await fetch('data.json');
            if (!response.ok) throw new Error("Data file not found.");
            
            const data = await response.json();

            // Find the student in the array
            const student = data.find(s => s.adm_no.toUpperCase() === input);

            loading.style.display = 'none';

            if (student) {
                displayPathway.innerHTML = `Mapped Pathway:<br>${student.assigned_pathway}`;
                displayPathway.classList.remove('error');
            } else {
                displayPathway.innerText = "Admission Number not found. Please check and try again.";
                displayPathway.classList.add('error');
            }
        } catch (error) {
            loading.style.display = 'none';
            displayPathway.innerText = "System error. Please try again later.";
            displayPathway.classList.add('error');
            console.error(error);
        }
    }
</script>

</body>
</html>
