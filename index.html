<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Portal | Rudan Junior Secondary</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Include SHA-1 Library for secure hashing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha1/0.6.0/sha1.min.js"></script>
    
    <style>
        :root {
            /* High-Contrast Palette */
            --navy: #000b14;
            --blue: #0074d9;
            --accent: #00e5ff; 
            --red: #ff4136;
            --green: #2ecc40;
            --white: #ffffff;
            
            /* Deeper Glassmorphism for better visibility */
            --glass-bg: rgba(0, 0, 0, 0.65); /* Darker background for contrast */
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 25px 60px rgba(0, 0, 0, 0.7);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: var(--white);
            /* Darker Gradient for text pop */
            background: linear-gradient(-45deg, #000b14, #05192d, #330000, #022b21, #001a2e);
            background-size: 400% 400%;
            animation: gradientMove 18s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .search-card {
            background: var(--glass-bg);
            backdrop-filter: blur(35px); /* Stronger blur */
            -webkit-backdrop-filter: blur(35px);
            border-radius: 28px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            padding: 50px 40px;
            width: 100%;
            max-width: 460px;
            text-align: center;
        }

        header {
            margin-bottom: 35px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        .logo {
            font-weight: 800;
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--accent);
            font-weight: 700;
            margin-top: 12px;
            letter-spacing: 1px;
            font-size: 0.9rem;
            line-height: 1.5;
            text-transform: uppercase;
        }

        .input-group {
            margin: 35px 0 20px 0;
            text-align: left;
        }

        label {
            font-weight: 800;
            margin-bottom: 10px;
            font-size: 0.8rem;
            color: var(--white); /* White label for contrast */
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
        }

        input {
            width: 100%;
            padding: 18px;
            background: rgba(0, 0, 0, 0.4); /* Darker input bg */
            border: 2px solid var(--glass-border);
            border-radius: 14px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            background: rgba(0, 0, 0, 0.6);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
        }

        button {
            width: 100%;
            padding: 20px;
            background: var(--accent);
            color: var(--navy);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0, 229, 255, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            filter: brightness(1.15);
            box-shadow: 0 15px 30px rgba(0, 229, 255, 0.6);
        }

        /* Modal / Pop-up Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }

        .modal-content {
            background: #05192d; border: 1px solid var(--accent); padding: 40px;
            border-radius: 28px; width: 90%; max-width: 500px; text-align: left;
            animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 50px rgba(0, 229, 255, 0.2);
        }

        @keyframes modalPop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        .modal-header-tag { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; font-weight: 800; letter-spacing: 2px; margin-bottom: 5px; }
        .student-name { font-size: 1.8rem; font-weight: 800; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        
        .score-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .score-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .score-box b { display: block; color: var(--accent); font-size: 0.65rem; text-transform: uppercase; }
        
        .pathway-result { padding: 15px; border-radius: 15px; text-align: center; font-size: 1.3rem; font-weight: 800; text-transform: uppercase; }
        
        .close-modal { margin-top: 25px; width: 100%; padding: 15px; background: transparent; border: 1px solid var(--glass-border); color: #fff; border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .close-modal:hover { background: rgba(255,255,255,0.1); }

        #result-area {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid var(--glass-border);
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background-color: rgba(255, 65, 54, 0.3);
            color: #ffffff;
            padding: 20px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 800;
            border: 2px solid var(--red);
        }
    </style>
</head>
<body>

<div class="search-card">
    <header>
        <div class="logo">RUDAN JUNIOR</div>
        <p class="subtitle">Elite Senior School Pathway</p>
    </header>

    <div class="input-group">
        <label for="admNo">Enter Admission Number</label>
        <input type="text" id="admNo" placeholder="RJSS/123JS/2026" spellcheck="false">
    </div>
    
    <button onclick="checkPathway()">Search Records</button>

    <div id="result-area">
        <div id="loading" style="display:none;">
            <div class="loading-spinner"></div>
            <p style="margin-top: 15px; font-weight: 800; color: var(--accent); letter-spacing: 1px;">QUERYING DATABASE...</p>
        </div>
    </div>
</div>

<!-- Results Pop-up Modal -->
<div id="modalOverlay" class="modal-overlay">
    <div id="modalContent" class="modal-content">
        <!-- Content will be injected here by JavaScript -->
    </div>
</div>

<script>
    async function checkPathway() {
        const rawInput = document.getElementById('admNo').value.trim().toUpperCase();
        const resultArea = document.getElementById('result-area');
        const loading = document.getElementById('loading');
        const overlay = document.getElementById('modalOverlay');
        const content = document.getElementById('modalContent');

        if (!rawInput) {
            alert("Input required: Please enter the Admission Number.");
            return;
        }

        // 1. Criteria Validation: RJSS/[3-5 Digits]JS/[Year]
        const criteria = /^RJSS\/\d{3,5}JS\/\d{4}$/;

        resultArea.style.display = 'block';
        loading.style.display = 'block';

        setTimeout(async () => {
            // Check criteria first
            if (!criteria.test(rawInput)) {
                loading.style.display = 'none';
                content.innerHTML = `
                    <div class="error" style="text-align:center;">
                        NO RECORDS FOUND<br>
                        <span style="font-size: 0.8rem; font-weight: 400;">The admission number format is invalid.</span>
                    </div>
                    <button class="close-modal" onclick="closeModal()">Try Again</button>
                `;
                overlay.style.display = 'flex';
                return;
            }

            const hashedInput = sha1(rawInput);

            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error("Connection failed.");
                
                const data = await response.json();
                const student = data.find(s => s.h === hashedInput);

                loading.style.display = 'none';

                if (student) {
                    // Inject student data into modal
                    content.innerHTML = `
                        <div class="modal-header-tag">Admission Verified</div>
                        <div style="color: var(--accent); font-weight: 800; font-size: 0.9rem;">${rawInput}</div>
                        <div class="student-name">${student.n || 'Academic Report'}</div>
                        
                        <div class="modal-header-tag">Subject Performance</div>
                        <div class="score-grid">
                            ${Object.entries(student.sc || {}).map(([subject, score]) => `
                                <div class="score-box">
                                    <b>${subject}</b>
                                    <span>${score}</span>
                                </div>
                            `).join('')}
                        </div>

                        <div class="modal-header-tag">Identified Pathway</div>
                        <div class="pathway-result" style="background-color: ${getPathwayColor(student.p)};">
                            ${student.p}
                        </div>
                        
                        <button class="close-modal" onclick="closeModal()">Close Window</button>
                    `;
                    overlay.style.display = 'flex';
                } else {
                    content.innerHTML = `
                        <div class="error" style="text-align:center;">
                            NO RECORDS FOUND<br>
                            <span style="font-size: 0.8rem; font-weight: 400;">Admission number not found in our system.</span>
                        </div>
                        <button class="close-modal" onclick="closeModal()">Close Window</button>
                    `;
                    overlay.style.display = 'flex';
                }
            } catch (error) {
                loading.style.display = 'none';
                alert("Offline Status: Ensure data.json is in the root folder.");
            }
        }, 800);
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
        document.getElementById('result-area').style.display = 'none';
    }

    function getPathwayColor(p) {
        if(p.toUpperCase().includes('STEM')) return '#0074d9';
        if(p.toUpperCase().includes('SOCIAL')) return '#ff4136';
        if(p.toUpperCase().includes('ARTS')) return '#2ecc40';
        return '#00e5ff';
    }
</script>

</body>
</html>
